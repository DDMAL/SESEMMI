apiVersion: v1
kind: Secret
metadata:
  name: sesemmi-secrets
  namespace: sesemmi
type: Opaque
stringData:
  # Postgres — password matches the one inside DATABASE_URL (production .env).
  POSTGRES_PASSWORD: "<value>"
  DATABASE_URL: "postgresql+psycopg://postgres:<value>@postgres:5432/sesemmi"

  # Active LLM provider key (LLM_PROVIDER=qwen → DashScope).
  DASHSCOPE_API_KEY: "<value>"

  # Other provider keys — only the active provider's key is used.
  OPENAI_API_KEY: "<value>"
  ANTHROPIC_API_KEY: "<value>"
  GEMINI_API_KEY: "<value>"

  # LangSmith tracing key (LANGSMITH_TRACING=true in production).
  LANGSMITH_API_KEY: "<value>"

  # Proxy key the Next.js app sends to the llm-service — not set in .env, left empty.
  LLM_API_KEY: ""
