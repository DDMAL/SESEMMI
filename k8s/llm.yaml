apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm
  namespace: sesemmi
  labels:
    app.kubernetes.io/name: llm
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: llm
  template:
    metadata:
      labels:
        app.kubernetes.io/name: llm
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - "until nc -z postgres 5432; do echo waiting for postgres; sleep 2; done"
      containers:
        - name: llm
          image: ghcr.io/ddmal/sesemmi-llm:main
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: sesemmi-config
            - secretRef:
                name: sesemmi-secrets
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: llm
  namespace: sesemmi
  labels:
    app.kubernetes.io/name: llm
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: llm
  ports:
    - name: http
      port: 8000
      targetPort: 8000
