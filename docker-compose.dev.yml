# Development overrides.
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build
#    or: make dev-build

services:
  app:
    build:
      target: dev
    ports:
      - "3000:3000"
    volumes:
      # Bind-mount entire source for hot reload
      - ./:/app
      # Anonymous volume shadows node_modules with the Alpine-compiled
      # version from the image — prevents macOS binaries from leaking in
      - /app/node_modules
      # Named volume persists .next incremental cache between restarts
      - sesemmi_next_cache:/app/.next
    env_file: .env
    environment:
      - NODE_ENV=development
      - WATCHPACK_POLLING=true
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  nginx:
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/dev/default.conf:/etc/nginx/conf.d/default.conf:ro
    environment:
      - HOST_NAME=${HOST_NAME:-localhost}

  postgres:
    environment:
      POSTGRES_DB: sesemmi
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - sesemmi_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  llm:
    ports:
      - "8000:8000"
    volumes:
      # Only mount source code — keeps the image's .venv intact
      - ./llm-service/app:/app/app
    env_file: .env
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

volumes:
  sesemmi_next_cache:
  sesemmi_pgdata:
