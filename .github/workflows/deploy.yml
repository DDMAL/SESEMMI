name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Load SSH keys
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: |
            ${{ secrets.SSH_PROXY_KEY }}
            ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Configure SSH hop chain
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          cat >> ~/.ssh/config << EOF
          Host jumpbox
            HostName ${{ secrets.SSH_PROXY_HOST }}
            User ${{ secrets.SSH_PROXY_USER }}
            StrictHostKeyChecking no
            ConnectTimeout 15
            RequestTTY no

          Host edge
            HostName ${{ secrets.SSH_EDGE_HOST }}
            User ${{ secrets.SSH_EDGE_USER }}
            ProxyJump jumpbox
            StrictHostKeyChecking no
            ConnectTimeout 15
            RequestTTY no

          Host server
            HostName ${{ secrets.SSH_HOST }}
            User ${{ secrets.SSH_USER }}
            Port ${{ secrets.SSH_PORT }}
            ProxyJump edge
            StrictHostKeyChecking no
            ConnectTimeout 15
            RequestTTY no
          EOF
          chmod 600 ~/.ssh/config

      - name: Deploy
        run: |
          ssh -T server 'sudo bash -s' << 'ENDSSH'
          set -e
          cd ${{ secrets.SSH_WORK_DIR }}
          git pull origin main
          docker compose -f docker-compose.yml -f docker-compose.prod.yml \
            up -d --build --remove-orphans
          docker image prune -f
          ENDSSH
