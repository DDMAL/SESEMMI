name: Backend CI

on:
  push:
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (black)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install uv
      - run: uv sync --frozen
        working-directory: llm-service
      - run: uv run black --check .
        working-directory: llm-service

  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install uv
      - run: uv sync --frozen
        working-directory: llm-service
      - run: uv run pytest
        working-directory: llm-service
