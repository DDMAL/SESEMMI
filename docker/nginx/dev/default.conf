# Development nginx config — HTTP only, no SSL.
# Plain .conf (not .template) — mounted directly, bypasses envsubst.

server {
    listen 80;
    server_name localhost;

    location / {
        proxy_pass http://app:3000;
        proxy_http_version 1.1;
        # Required for Next.js HMR WebSocket connection
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Generous timeout for slow first compile in dev
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        # Disable buffering for RSC streaming responses
        proxy_buffering off;
    }
}
